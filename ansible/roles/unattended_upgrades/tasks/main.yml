---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true

- name: Enable periodic apt update + unattended upgrade
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# Debian's stock 50unattended-upgrades already enables the security origin.
# This drop-in only sets the reboot policy for an unattended remote box.
- name: Set automatic-reboot policy for unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    mode: "0644"
    content: |
      Unattended-Upgrade::Automatic-Reboot "{{ unattended_auto_reboot | bool | lower }}";
      Unattended-Upgrade::Automatic-Reboot-Time "{{ unattended_auto_reboot_time }}";
