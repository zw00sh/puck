[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = True
interpreter_python = /usr/bin/python3
# YAML-formatted output via the built-in default callback. (The old
# community.general.yaml callback was removed in community.general 12.0.)
stdout_callback = default
result_format = yaml
nocows = 1

[ssh_connection]
# accept-new: trust a fresh box's host key on first contact, but pin it thereafter.
# PreferredAuthentications: try the key first, fall back to the factory password
# IN ONE connection — a connection that ultimately authenticates never trips
# OpenSSH 9.8+ PerSourcePenalties (a separate key-only auth failure would).
ssh_args = -o StrictHostKeyChecking=accept-new -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey,password
pipelining = True
