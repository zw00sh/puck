name: release puckview

# Cut a release by pushing a tag, e.g.:  git tag puckview-v1.0.0 && git push --tags
# Publishes the binaries the ansible puckview role get_url's by default.
on:
  push:
    tags: ["puckview-v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: puckview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: puckview/go.sum

      - name: Test
        run: go test ./...

      - name: Cross-compile static binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#puckview-v}"
          mkdir -p ../dist
          # arm64 is the puck (NanoPi Zero2); amd64 + darwin/arm64 for dev.
          for target in linux/arm64 linux/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "building puckview-$os-$arch"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=$VERSION" \
              -o "../dist/puckview-$os-$arch" ./cmd/puckview
          done
          cd ../dist
          for f in puckview-*; do sha256sum "$f" | tee "$f.sha256"; done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/puckview-*
          generate_release_notes: true
